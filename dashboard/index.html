<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Executive Dashboard - UCE2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/kpi.css">
    <link rel="stylesheet" href="css/modules.css">
    <link rel="stylesheet" href="css/trend.css">
    <link rel="stylesheet" href="css/widgets.css">

</head>

<body>

    <div class="page-wrapper">

        <header class="qa-header">

            <div class="header-left">

                <h1>QA Insight</h1>

                <p>Executive Test Analytics</p>

                <div class="build-info">

                    <span class="status success">
                        <i class="fa-solid fa-circle-check"></i>
                        Success
                    </span>

                    <span>Build #128</span>

                    <span>Release 5.4</span>

                    <span>QA</span>

                    <span>Chrome 125</span>

                    <span>11 Jul 2026, 10:15 AM</span>

                </div>

            </div>

            <div class="header-right">

                <button class="btn btn-outline" id="openAllureBtn">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    Open Allure
                </button>

            </div>

        </header>

        <section class="kpi-section">

            <div class="pass-rate-card">

                <div class="metric-title">Pass Rate</div>

                <div class="pass-rate-body">

                    <div class="gauge-placeholder" id="passRate">
                        <svg width="150" height="75" viewBox="0 0 100 50">
                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e5e7eb" stroke-width="10"
                                stroke-linecap="round" />
                            <path id="gaugeProgress" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#22c55e"
                                stroke-width="10" stroke-linecap="round" stroke-dasharray="125.66"
                                stroke-dashoffset="125.66" />
                        </svg>
                        <span>0%</span>
                    </div>

                    <div class="pass-change" id="passRateChange">
                        --
                    </div>

                </div>

            </div>

            <div class="summary-strip">

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon total">
                            <i class="fa-solid fa-list-check"></i>

                        </div>

                        <span class="summary-label">Total Tests</span>

                    </div>

                    <span class="value total-value" id="totalTests">0</span>
                    <span class="summary-subtext" id="totalTestsDelta"></span>

                </div>

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon passed">
                            <i class="fa-solid fa-circle-check"></i>

                        </div>
                        <span class="summary-label">Passed</span>

                    </div>

                    <span class="value pass-value" id="passedTests">0</span>
                    <span class="summary-subtext" id="passedPercentage"></span>

                </div>

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon failed">
                            <i class="fa-solid fa-circle-xmark"></i>

                        </div>

                        <span class="summary-label">Failed</span>

                    </div>

                    <span class="value fail-value" id="failedTests">0</span>
                    <span class="summary-subtext" id="failedPercentage"></span>


                </div>

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon broken">
                            <i class="fa-solid fa-triangle-exclamation"></i>

                        </div>

                        <span class="summary-label">Broken</span>

                    </div>

                    <span class="value broken-value" id="brokenTests">0</span>
                    <span class="summary-subtext" id="brokenPercentage"></span>


                </div>

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon skipped">
                            <i class="fa-solid fa-forward"></i>

                        </div>

                        <span class="summary-label">Skipped</span>

                    </div>

                    <span class="value skipped-value" id="skippedTests">0</span>
                    <span class="summary-subtext" id="skippedPercentage"></span>


                </div>

                <div class="summary-item">

                    <div class="summary-header">

                        <div class="summary-icon duration">
                            <i class="fa-solid fa-clock"></i>

                        </div>

                        <span class="summary-label">Execution Time</span>

                    </div>

                    <span class="value duration-value" id="duration">0s</span>
                    <span class="summary-subtext" id="durationDelta"></span>


                </div>

            </div>

        </section>

        <section class="overview-section">

            <div class="card module-card">

                <div class="card-header">
                    <h2>Module Overview (BDD Features)</h2>
                </div>

                <div class="module-content">

                    <div class="module-list-header">

                        <span>Module</span>

                        <span>Tests</span>

                        <span>Pass Rate</span>

                        <span>Failed</span>

                    </div>

                    <div id="moduleList"></div>
                </div>

            </div>


            <div class="card trend-card">

                <div class="card-header">

                    <h2>Trend</h2>

                    <select>

                        <option>Last 14 Days</option>

                    </select>

                </div>

                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>

            </div>

        </section>

        <section class="dashboard-bottom">

            <div class="card">
                <div class="card-header">
                    <h3>Recent Failures</h3>
                </div>

                <div id="recentFailures"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Execution Details</h3>
                </div>

                <div id="executionDetails"></div>
            </div>

        </section>

    </div>

    <!-- DASHBOARD_DATA -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dist/app.bundle.js"></script>
    <!-- <script type="module" src="js/app.js"></script> -->
</body>

</html>
